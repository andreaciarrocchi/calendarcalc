<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Shadow -->
  <ellipse cx="52" cy="90" rx="30" ry="5" fill="#1a4a5a" opacity="0.35"/>

  <!-- Calendar body -->
  <rect x="10" y="20" width="68" height="62" rx="6" ry="6" fill="white"/>

  <!-- Red top bar -->
  <rect x="10" y="20" width="68" height="22" rx="6" ry="6" fill="#e32"/>
  <rect x="10" y="34" width="68" height="8" fill="#e32"/>

  <!-- Spiral rings (teal) -->
  <rect x="24" y="14" width="7" height="14" rx="3.5" fill="#1a6070"/>
  <rect x="36" y="14" width="7" height="14" rx="3.5" fill="#1a6070"/>
  <rect x="48" y="14" width="7" height="14" rx="3.5" fill="#1a6070"/>
  <rect x="60" y="14" width="7" height="14" rx="3.5" fill="#1a6070"/>

  <!-- Calendar grid lines -->
  <line x1="22" y1="52" x2="32" y2="52" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="38" y1="52" x2="48" y2="52" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="54" y1="52" x2="64" y2="52" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>

  <line x1="22" y1="60" x2="32" y2="60" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="38" y1="60" x2="48" y2="60" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>

  <line x1="22" y1="68" x2="32" y2="68" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="38" y1="68" x2="48" y2="68" stroke="#333" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Red dot (today marker) -->
  <circle cx="22" cy="44" r="3" fill="#e32"/>

  <!-- Heart -->
  <path d="M62 62 C62 57 55 54 55 60 C55 54 48 57 48 62 C48 67 55 73 55 73 C55 73 62 67 62 62 Z"
        fill="#e32"/>

  <!-- Folded page corner -->
  <path d="M72 42 L78 42 L78 82 Q78 86 74 86 L16 86 Q12 86 12 82 L12 42 Z"
        fill="#ddeeff" opacity="0.10"/>
</svg>
